<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pSEO Review</title>
<style>
  :root {
    --bg: #f7f7f8;
    --panel: #ffffff;
    --border: #e3e3e6;
    --text: #1c1c1e;
    --muted: #6b6b70;
    --accent: #2563eb;
    --green: #16a34a;
    --grey: #b4b4b8;
    --add-bg: #e6f4ea;
    --add-text: #14532d;
    --del-bg: #fce8e8;
    --del-text: #7f1d1d;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    display: flex;
  }

  /* Sidebar */
  #sidebar {
    width: 300px;
    flex: 0 0 300px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #sidebar header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar h1 { font-size: 15px; margin: 0; }
  #sidebar .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  #page-list { overflow-y: auto; flex: 1; }
  .page-item {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .page-item:hover { background: #f0f4ff; }
  .page-item.active { background: #e8efff; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 9px; }
  .dot.drafting { background: var(--grey); }
  .dot.ready { background: var(--accent); }
  .dot.approved { background: var(--green); }
  .page-item .meta { min-width: 0; }
  .page-item .title {
    font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .page-item .path { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .page-item.approved .title { color: var(--muted); text-decoration: line-through; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; height: 100vh; min-width: 0; }
  #main-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #main-header h2 { font-size: 15px; margin: 0; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #main-header .path { color: var(--muted); font-size: 12px; }

  .toggle {
    font-size: 12px; color: var(--accent); cursor: pointer; user-select: none;
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; background: var(--panel);
  }
  .toggle.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  #evidence {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: #fafafa;
    font-size: 13px;
  }
  #evidence summary { cursor: pointer; font-weight: 600; }
  #evidence .summary-text { margin: 8px 0; color: var(--text); white-space: pre-wrap; }
  #evidence ol { margin: 6px 0 0; padding-left: 20px; color: var(--muted); }
  #evidence li { margin-bottom: 4px; }

  #editor-wrap { flex: 1; display: flex; min-height: 0; }
  textarea#editor {
    flex: 1; width: 100%; border: 0; resize: none; padding: 18px 20px;
    font: 13px/1.6 "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    color: var(--text); outline: none;
  }
  #diff {
    flex: 1; overflow-y: auto; padding: 18px 20px; margin: 0;
    font: 13px/1.6 "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    white-space: pre-wrap; word-break: break-word; background: var(--panel);
  }
  .dl { display: block; padding: 0 4px; }
  .dl.add { background: var(--add-bg); color: var(--add-text); }
  .dl.del { background: var(--del-bg); color: var(--del-text); }

  #footer {
    padding: 12px 20px; border-top: 1px solid var(--border); background: var(--panel);
    display: flex; align-items: center; gap: 14px;
  }
  #status-msg { color: var(--muted); font-size: 12px; flex: 1; }
  button.action {
    border: 0; border-radius: 7px; padding: 9px 18px; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .btn-approve { background: var(--green); color: #fff; }
  .btn-approve:disabled { background: var(--grey); cursor: default; }

  .empty { margin: auto; color: var(--muted); text-align: center; padding: 40px; }
</style>
</head>
<body>
  <aside id="sidebar">
    <header>
      <h1>pSEO Review</h1>
      <div class="sub" id="counts">Loading…</div>
    </header>
    <div id="page-list"></div>
  </aside>

  <main id="main">
    <div class="empty" id="empty">Select a page from the sidebar.</div>

    <div id="viewer" hidden style="display:flex; flex-direction:column; flex:1; min-height:0;">
      <div id="main-header">
        <h2 id="page-title"></h2>
        <span class="toggle" id="diff-toggle">Diff vs original</span>
      </div>

      <details id="evidence" open>
        <summary>Evidence summary</summary>
        <div class="summary-text" id="evidence-summary"></div>
        <ol id="evidence-refs"></ol>
      </details>

      <div id="editor-wrap">
        <textarea id="editor" spellcheck="false"></textarea>
        <pre id="diff" hidden></pre>
      </div>

      <div id="footer">
        <span id="status-msg"></span>
        <button class="action btn-approve" id="approve-btn">Approve &amp; commit</button>
      </div>
    </div>
  </main>

<script>
const $ = (id) => document.getElementById(id);
let pages = [];
let current = null;        // { path, title, summary, references, draft, original }
let dirty = false;
let saveTimer = null;

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || r.statusText);
  return r.json();
}

async function loadPages() {
  pages = await api("/api/pages");
  const ready = pages.filter(p => p.status === "ready").length;
  const done = pages.filter(p => p.status === "approved").length;
  $("counts").textContent = `${pages.length} pages · ${ready} ready · ${done} approved`;
  renderList();
}

function renderList() {
  const list = $("page-list");
  list.innerHTML = "";
  for (const p of pages) {
    const el = document.createElement("div");
    el.className = "page-item " + p.status + (current && current.path === p.path ? " active" : "");
    el.innerHTML = `<span class="dot ${p.status}"></span>
      <span class="meta">
        <div class="title">${esc(p.title)}</div>
        <div class="path">${esc(p.path)}</div>
      </span>`;
    el.onclick = () => selectPage(p.path);
    list.appendChild(el);
  }
}

async function selectPage(path) {
  if (dirty && current) await saveNow();
  current = await api("/api/page?path=" + encodeURIComponent(path));
  dirty = false;
  $("empty").hidden = true;
  $("viewer").hidden = false;
  $("page-title").textContent = current.title;
  $("editor").value = current.draft;
  $("evidence-summary").textContent = current.summary || "(no summary provided)";
  const refs = $("evidence-refs");
  refs.innerHTML = "";
  for (const r of current.references || []) {
    const li = document.createElement("li");
    const doi = r.doi ? ` <a href="${esc(r.doi)}" target="_blank">${esc(r.doi)}</a>` : "";
    li.innerHTML = `${esc(r.author || "")} ${r.year ? "(" + r.year + ") " : ""}${esc(r.title || "")}. <em>${esc(r.journal || "")}</em>.${doi}`;
    refs.appendChild(li);
  }
  setDiff(false);
  setStatus(pages.find(p => p.path === path)?.status === "approved" ? "Already approved." : "");
  $("approve-btn").disabled = false;
  renderList();
}

// --- Diff (line-based LCS) ---
function diffLines(a, b) {
  const A = a.split("\n"), B = b.split("\n");
  const n = A.length, m = B.length;
  const dp = Array.from({ length: n + 1 }, () => new Int32Array(m + 1));
  for (let i = n - 1; i >= 0; i--)
    for (let j = m - 1; j >= 0; j--)
      dp[i][j] = A[i] === B[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
  const out = [];
  let i = 0, j = 0;
  while (i < n && j < m) {
    if (A[i] === B[j]) { out.push(["ctx", A[i]]); i++; j++; }
    else if (dp[i + 1][j] >= dp[i][j + 1]) { out.push(["del", A[i]]); i++; }
    else { out.push(["add", B[j]]); j++; }
  }
  while (i < n) { out.push(["del", A[i]]); i++; }
  while (j < m) { out.push(["add", B[j]]); j++; }
  return out;
}

function setDiff(on) {
  $("diff-toggle").classList.toggle("on", on);
  $("editor").hidden = on;
  $("diff").hidden = !on;
  if (!on) return;
  const rows = diffLines(current.original || "", $("editor").value);
  $("diff").innerHTML = rows.map(([k, line]) => {
    const cls = k === "add" ? "dl add" : k === "del" ? "dl del" : "dl";
    const prefix = k === "add" ? "+ " : k === "del" ? "- " : "  ";
    return `<span class="${cls}">${esc(prefix + line)}</span>`;
  }).join("");
}

$("diff-toggle").onclick = () => setDiff($("diff").hidden);

// --- Editing / autosave ---
$("editor").oninput = () => {
  dirty = true;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNow, 1200);
};

async function saveNow() {
  if (!current || !dirty) return;
  try {
    await api("/api/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: current.path, content: $("editor").value }),
    });
    dirty = false;
    setStatus("Draft saved.");
  } catch (e) { setStatus("Save failed: " + e.message); }
}

$("approve-btn").onclick = async () => {
  if (!current) return;
  $("approve-btn").disabled = true;
  setStatus("Committing…");
  try {
    await api("/api/approve", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: current.path, content: $("editor").value }),
    });
    dirty = false;
    setStatus("Approved & committed.");
    await loadPages();
    advanceToNextReady();
  } catch (e) {
    setStatus("Approve failed: " + e.message);
    $("approve-btn").disabled = false;
  }
};

function advanceToNextReady() {
  const next = pages.find(p => p.status === "ready");
  if (next) selectPage(next.path);
}

function setStatus(msg) { $("status-msg").textContent = msg; }
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

// Refresh the list periodically so drafts landing from the agent appear live.
loadPages();
setInterval(() => { if (!dirty) loadPages(); }, 4000);
window.addEventListener("beforeunload", () => { if (dirty) saveNow(); });
</script>
</body>
</html>
